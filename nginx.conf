worker_processes  1;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout  65;

    # ── Rate limiting for login endpoint ──
    limit_req_zone $binary_remote_addr zone=auth_login:10m rate=5r/m;
    limit_req_status 429;

    server {
        listen 7456;
        server_name _;
        client_max_body_size 100m;
        absolute_redirect off;
        port_in_redirect off;

        # ── Auth Request (internal, checked by nginx before proxying) ──
        location /auth-check {
            internal;
            proxy_pass http://127.0.0.1:7458/check;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header Cookie $http_cookie;
        }

        # ── Login / Logout (no auth required, rate limited) ──
        location /login {
            limit_req zone=auth_login burst=3 nodelay;
            proxy_pass http://127.0.0.1:7458/login;
            proxy_set_header Host $host;
        }

        location /logout {
            proxy_pass http://127.0.0.1:7458/logout;
            proxy_set_header Host $host;
        }

        # ── Static assets for auth page (if any) ──
        location /auth-static/ {
            proxy_pass http://127.0.0.1:7458/;
            proxy_set_header Host $host;
        }

        # ── All other requests → require valid session ──
        location / {
            auth_request /auth-check;
            auth_request_set $auth_status $upstream_status;

            error_page 401 = @login_redirect;

            proxy_pass http://127.0.0.1:7457;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
        }

        # ── Redirect to login on auth failure ──
        location @login_redirect {
            return 302 /login;
        }
    }
}
